services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app/backend          # hot-reload: backend code changes apply instantly
      - ./static:/app/static            # uploaded files (profile photos etc.)
      - ./frontend:/app/frontend        # built frontend (served by FastAPI at /)
    ports:
      - "8001:8000"    # 8000 is taken by artechrms-app; use 8001 on host
    env_file:
      - .env.dev
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./hrms-react:/app               # source files — changes trigger hot-reload
      - frontend_modules:/app/node_modules  # keeps container node_modules separate from host
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_URL: http://backend:8000   # Docker service name instead of localhost
    # npm install runs automatically on first start so you don't need to run it manually
    command: sh -c "npm install --silent && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_modules:
