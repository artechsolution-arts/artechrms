name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.1, v2.0.0, etc.
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Clone repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout FETCH_HEAD

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: hrms-react/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hrms-react/src-tauri -> target

      - name: Install npm dependencies
        run: npm ci
        working-directory: hrms-react

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: hrms-react
          tagName: ${{ github.ref_name }}
          releaseName: 'AR Peopliz ${{ github.ref_name }}'
          releaseBody: |
            ## Download AR Peopliz

            ### 🖥️ Desktop Apps
            | Platform | File to download |
            |----------|-----------------|
            | **Windows** | `AR.Peopliz_x64-setup.exe` (installer) or `AR.Peopliz_x64_en-US.msi` |
            | **macOS — Apple Silicon (M1/M2/M3)** | `AR.Peopliz_aarch64.dmg` |
            | **macOS — Intel** | `AR.Peopliz_x64.dmg` |

            ### 📱 Mobile Apps
            | Platform | File to download |
            |----------|-----------------|
            | **Android** | `AR-Peopliz-Android-Release.apk` — enable "Install unknown apps" in Settings |
            | **iOS (iPhone/iPad)** | No download needed — use the **web app** instead (see below) |

            ### 🌐 iOS / Web Install (free, no App Store needed)
            1. Open **Safari** on your iPhone or iPad
            2. Go to your AR Peopliz URL
            3. Tap the **Share** button (box with arrow)
            4. Tap **"Add to Home Screen"**
            5. Tap **Add** — the app icon appears on your home screen

            The web app works exactly like a native app on iOS.

            ---
            Built from commit `${{ github.sha }}`
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
