name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.1, v2.0.0, etc.
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Clone repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout FETCH_HEAD

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: hrms-react/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hrms-react/src-tauri -> target

      - name: Install npm dependencies
        run: npm ci
        working-directory: hrms-react

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: hrms-react
          tagName: ${{ github.ref_name }}
          releaseName: 'AR Peopliz ${{ github.ref_name }}'
          releaseBody: |
            ## Download AR Peopliz

            ### 🖥️ Windows
            Download `AR.Peopliz_x64-setup.exe` and run it. If Windows SmartScreen warns you, click **"More info" → "Run anyway"**.

            ### 🍎 macOS
            Download the `.dmg` for your chip:
            - **Apple Silicon (M1/M2/M3/M4)** → `AR.Peopliz_aarch64.dmg`
            - **Intel Mac** → `AR.Peopliz_x64.dmg`

            **macOS will block the app on first open** (it's not from the App Store). To install:
            1. Double-click the `.dmg` and drag AR Peopliz to Applications
            2. **Do NOT double-click** the app — instead **right-click → Open**
            3. Click **Open** on the security dialog
            4. The app opens normally from now on

            Or via Terminal: `xattr -cr "/Applications/AR Peopliz.app"`

            ### 📱 Android
            Download `AR-Peopliz-Android.apk`.

            **First-time install steps:**
            1. Open the APK file on your phone
            2. If prompted, go to **Settings → Install unknown apps** and allow your browser/Files app
            3. Tap **Install**
            4. If Google Play Protect warns you, tap **"Install anyway"** — the app is safe

            ### 🍏 iOS (iPhone / iPad)
            No download needed. Install as a web app via Safari:
            1. Open **Safari** → go to your AR Peopliz URL
            2. Tap the **Share** button (box with arrow at the bottom)
            3. Tap **"Add to Home Screen"** → tap **Add**

            The icon appears on your home screen and works like a native app.

            ---
            Built from commit `${{ github.sha }}`
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
