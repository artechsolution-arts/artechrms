name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest   # Apple Silicon (M1/M2/M3/M4)
            label: macOS-AppleSilicon
            artifact: AR-Peopliz-macOS-AppleSilicon.dmg
          - os: macos-13       # Intel Mac
            label: macOS-Intel
            artifact: AR-Peopliz-macOS-Intel.dmg
          - os: windows-latest
            label: Windows
            artifact: AR-Peopliz-Windows-Setup.exe

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.label }}

    steps:
      - name: Clone repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout FETCH_HEAD

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Build desktop app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APP_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: |
          pake "$APP_URL" \
            --name "AR Peopliz" \
            --icon hrms-react/src-tauri/icons/icon-512.png \
            --width 1280 \
            --height 800
          find . -maxdepth 2 -name "*.dmg" | head -1 | xargs -I{} mv {} "${{ matrix.artifact }}"

      - name: Build desktop app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          APP_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: |
          pake "$env:APP_URL" --name "AR Peopliz" --icon hrms-react/src-tauri/icons/icon-512.png --width 1280 --height 800
          $exe = Get-ChildItem -Recurse -Filter "*.exe" | Where-Object { $_.Name -notlike "*pake*" } | Select-Object -First 1
          if ($exe) { Move-Item $exe.FullName "${{ matrix.artifact }}" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.artifact }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          name: AR Peopliz ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## AR Peopliz ${{ github.ref_name }}

            ### 🖥️ Windows
            1. Download **`AR-Peopliz-Windows-Setup.exe`**
            2. Run it — if Windows SmartScreen appears, click **More info → Run anyway**

            ### 🍎 macOS — Apple Silicon (M1/M2/M3/M4)
            1. Download **`AR-Peopliz-macOS-AppleSilicon.dmg`**
            2. Open the DMG and drag **AR Peopliz** to Applications
            3. **Right-click → Open** (do NOT double-click the first time)
            4. Click **Open** in the dialog

            **If you see "can't be opened" instead — run this once in Terminal:**
            ```
            xattr -dr com.apple.quarantine "/Applications/AR Peopliz.app"
            ```
            Then double-click normally from now on.

            ### 🍎 macOS — Intel Mac
            Same steps as above but download **`AR-Peopliz-macOS-Intel.dmg`**

            ### 📱 Android
            1. Download **`AR-Peopliz-Android.apk`**
            2. Open it on your phone → Settings → **Install unknown apps** → allow your browser
            3. Tap **Install** → if Play Protect warns, tap **Install anyway**

            ### 🍏 iOS (iPhone / iPad) — no download needed
            1. Open **Safari** → go to your AR Peopliz URL
            2. Tap **Share** (box with arrow) → **Add to Home Screen** → **Add**

            ---
            Built from `${{ github.sha }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
