name: Build Mobile Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: hrms-react/package-lock.json

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install npm dependencies
        working-directory: hrms-react
        run: npm ci

      - name: Build web app
        working-directory: hrms-react
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: npm run build

      - name: Sync Capacitor → Android
        working-directory: hrms-react
        run: npx cap sync android

      - name: Build Debug + Release APK
        working-directory: hrms-react/android
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ar-peopliz-debug
          path: hrms-react/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: ar-peopliz-release-unsigned
          path: hrms-react/android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Attach APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hrms-react/android/app/build/outputs/apk/debug/app-debug.apk
            hrms-react/android/app/build/outputs/apk/release/app-release-unsigned.apk
          name: AR Peopliz ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios-check:
    name: iOS Build Check
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: hrms-react/package-lock.json

      - name: Install npm dependencies
        working-directory: hrms-react
        run: npm ci

      - name: Build web app
        working-directory: hrms-react
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: npm run build

      - name: Sync Capacitor → iOS
        working-directory: hrms-react
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: hrms-react/ios/App
        run: pod install

      - name: Build iOS (simulator, no signing)
        working-directory: hrms-react/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty || true
