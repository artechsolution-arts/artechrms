name: Build Mobile Apps

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout FETCH_HEAD

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install npm dependencies
        working-directory: hrms-react
        run: npm ci

      - name: Build web app
        working-directory: hrms-react
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: npm run build

      - name: Sync Capacitor → Android
        working-directory: hrms-react
        run: npx cap sync android

      - name: Build Debug + Release APK
        working-directory: hrms-react/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore ar-peopliz.keystore \
            -alias ar-peopliz \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=AR Peopliz, OU=Artech Solutions, O=Artech, L=Unknown, ST=Unknown, C=IN" \
            -storepass arpeopliz2024 \
            -keypass arpeopliz2024

      - name: Sign and align release APK
        run: |
          UNSIGNED=hrms-react/android/app/build/outputs/apk/release/app-release-unsigned.apk
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          # zipalign first, then sign
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign -v 4 $UNSIGNED AR-Peopliz-Android.apk
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks ar-peopliz.keystore \
            --ks-pass pass:arpeopliz2024 \
            --ks-key-alias ar-peopliz \
            --key-pass pass:arpeopliz2024 \
            AR-Peopliz-Android.apk
          echo "APK signed successfully"
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner verify AR-Peopliz-Android.apk && echo "Verification passed"

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AR-Peopliz-Android-APK
          path: AR-Peopliz-Android.apk

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AR-Peopliz-Android.apk
          name: AR Peopliz ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios-check:
    name: iOS Project Check
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout FETCH_HEAD

      - name: Validate iOS project files
        run: |
          test -d hrms-react/ios/App/App.xcodeproj && echo "✓ App.xcodeproj found" || echo "⚠ App.xcodeproj missing"
          test -f hrms-react/ios/App/App/AppDelegate.swift && echo "✓ AppDelegate.swift found" || echo "⚠ AppDelegate missing"
          echo "✓ iOS project structure OK"
