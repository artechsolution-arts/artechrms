services:

  minio:
    image: minio/minio:latest
    container_name: artechrms_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artechrms_app
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # Points to your local PostgreSQL 17 on the Mac host
      DATABASE_URL: postgresql://postgres:Joseph%4029@host.docker.internal:5432/artechrms
      SECRET_KEY: artech-hrms-super-secret-jwt-key-change-in-production
      ALLOWED_ORIGINS: "*"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: hrms
      MINIO_PUBLIC_URL: http://localhost:9000
    volumes:
      - uploads_data:/app/static/uploads

volumes:
  minio_data:
  uploads_data:
