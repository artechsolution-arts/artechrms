services:

  db:
    image: postgres:16-alpine
    container_name: artechrms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: artechrms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artechrms_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/artechrms
      SECRET_KEY: artech-hrms-super-secret-jwt-key-change-in-production
      ALLOWED_ORIGINS: http://localhost:8000
      # Optional: set your Anthropic API key for the AI assistant
      # ANTHROPIC_API_KEY: sk-ant-...
    volumes:
      # Persist uploaded files (profile photos, JD attachments, etc.)
      - uploads_data:/app/static/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
