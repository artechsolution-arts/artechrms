services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artechrms_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:Joseph%4029@host.docker.internal:5432/artechrms
      SECRET_KEY: artech-hrms-super-secret-jwt-key-change-in-production
      ALLOWED_ORIGINS: "*"
      # Optional: set your Anthropic API key for the AI assistant
      # ANTHROPIC_API_KEY: sk-ant-...
    volumes:
      - uploads_data:/app/static/uploads

volumes:
  uploads_data:
