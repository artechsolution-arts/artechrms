services:

  db:
    image: postgres:16-alpine
    container_name: artechrms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Joseph@29"
      POSTGRES_DB: artechrms
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d artechrms"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artechrms_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:Joseph%4029@db:5432/artechrms
      SECRET_KEY: artech-hrms-super-secret-jwt-key-change-in-production
      ALLOWED_ORIGINS: "*"
      # Optional: set your Anthropic API key for the AI assistant
      # ANTHROPIC_API_KEY: sk-ant-...
    volumes:
      - uploads_data:/app/static/uploads

volumes:
  db_data:
  uploads_data:
